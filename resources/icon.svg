<svg viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg" fill="none">
  <title>Some Git Tools</title>
  <rect width="128" height="128" rx="24" fill="#1A1B26"/>

  <!-- Main branch (vertical) -->
  <path d="M 32 22 L 32 106" stroke="#7AA2F7" stroke-width="5" stroke-linecap="round"/>

  <!-- Branch off curve -->
  <path d="M 32 56 C 32 42, 46 42, 60 42 L 72 42" stroke="#7AA2F7" stroke-width="5" fill="none" stroke-linecap="round"/>

  <!-- Branch dots -->
  <circle cx="32" cy="22" r="8" fill="#FF9E64"/>
  <circle cx="32" cy="56" r="8" fill="#FF9E64"/>
  <circle cx="32" cy="106" r="8" fill="#FF9E64"/>
  <circle cx="72" cy="42" r="8" fill="#FF9E64"/>

  <!-- Toolbox -->
  <g transform="translate(84, 84)">
    <!-- Handle -->
    <path d="M -10 -13 Q -10 -24, 0 -24 Q 10 -24, 10 -13"
          stroke="#C0CAF5" stroke-width="4" fill="none" stroke-linecap="round"/>

    <!-- Box body -->
    <rect x="-21" y="-13" width="42" height="28" rx="3" fill="#C0CAF5"/>

    <!-- Lid divider -->
    <line x1="-21" y1="-3" x2="21" y2="-3" stroke="#1A1B26" stroke-width="2"/>

    <!-- Latch -->
    <rect x="-4" y="-6" width="8" height="6" rx="0.5" fill="#1A1B26"/>
  </g>
</svg>
